<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage 测试页面</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        h2 {
            color: #555;
            margin-top: 30px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .success {
            color: #28a745;
            font-weight: bold;
        }
        .error {
            color: #dc3545;
            font-weight: bold;
        }
        .info {
            color: #17a2b8;
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        input[type="text"] {
            width: 300px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin: 5px;
        }
        #output {
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗄️ IndexedDB Storage 测试页面</h1>
        
        <div class="test-section">
            <h2>1. 数据库初始化</h2>
            <button onclick="testDatabaseInit()">测试数据库初始化</button>
            <button onclick="checkDatabaseStatus()">检查数据库状态</button>
            <div id="dbStatus"></div>
        </div>

        <div class="test-section">
            <h2>2. API 凭证测试</h2>
            <div>
                <input type="text" id="testApiKey" placeholder="输入 API Key" value="test-api-key-123">
                <button onclick="testSaveApiKey()">保存 API Key</button>
                <button onclick="testLoadApiKey()">读取 API Key</button>
            </div>
            <div>
                <input type="text" id="testAccessKeyId" placeholder="Access Key ID" value="test-access-key">
                <input type="text" id="testSecretKey" placeholder="Secret Key" value="test-secret-key">
                <button onclick="testSaveAccessKeys()">保存 Access Keys</button>
                <button onclick="testLoadAccessKeys()">读取 Access Keys</button>
            </div>
            <div id="credentialsResult"></div>
        </div>

        <div class="test-section">
            <h2>3. 配置测试</h2>
            <button onclick="testSaveConfig()">保存 TOS 配置</button>
            <button onclick="testLoadConfig()">读取 TOS 配置</button>
            <div id="configResult"></div>
        </div>

        <div class="test-section">
            <h2>4. 历史记录测试</h2>
            <button onclick="testSaveHistory()">保存历史记录</button>
            <button onclick="testLoadHistory()">读取历史记录</button>
            <button onclick="testClearHistory()">清空历史记录</button>
            <div id="historyResult"></div>
        </div>

        <div class="test-section">
            <h2>5. 任务管理测试</h2>
            <button onclick="testSaveTask()">创建任务</button>
            <button onclick="testLoadTasks()">读取所有任务</button>
            <button onclick="testUpdateTask()">更新任务</button>
            <button onclick="testDeleteTask()">删除任务</button>
            <div id="taskResult"></div>
        </div>

        <div class="test-section">
            <h2>6. 数据迁移测试</h2>
            <button onclick="testMigration()">模拟数据迁移</button>
            <button onclick="checkMigrationStatus()">检查迁移状态</button>
            <div id="migrationResult"></div>
        </div>

        <div class="test-section">
            <h2>7. 批量操作测试</h2>
            <button onclick="testBulkOperations()">批量添加数据</button>
            <button onclick="testGetAllData()">获取所有数据</button>
            <button onclick="testClearAll()">清空所有数据</button>
            <div id="bulkResult"></div>
        </div>

        <div class="test-section">
            <h2>8. 性能测试</h2>
            <button onclick="testPerformance()">运行性能测试</button>
            <div id="performanceResult"></div>
        </div>

        <h2>输出日志</h2>
        <div id="output"></div>
    </div>

    <script type="module">
        import { dbManager } from './src/utils/db.js';
        import { storage } from './src/utils/storage.js';
        import { storageSync } from './src/utils/storageSync.js';

        window.dbManager = dbManager;
        window.storage = storage;
        window.storageSync = storageSync;

        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            output.prepend(div);
        }

        window.log = log;

        // 1. 数据库初始化测试
        window.testDatabaseInit = async () => {
            try {
                log('开始初始化数据库...', 'info');
                await dbManager.init();
                log('✅ 数据库初始化成功！', 'success');
                document.getElementById('dbStatus').innerHTML = '<span class="status success">已初始化</span>';
            } catch (error) {
                log('❌ 数据库初始化失败: ' + error.message, 'error');
                document.getElementById('dbStatus').innerHTML = '<span class="status error">初始化失败</span>';
            }
        };

        window.checkDatabaseStatus = async () => {
            try {
                const credCount = await dbManager.count('credentials');
                const configCount = await dbManager.count('configs');
                const historyCount = await dbManager.count('history');
                const taskCount = await dbManager.count('tasks');
                
                const status = `
                    <pre>数据库统计:
- Credentials: ${credCount}
- Configs: ${configCount}
- History: ${historyCount}
- Tasks: ${taskCount}</pre>
                `;
                document.getElementById('dbStatus').innerHTML = status;
                log('✅ 数据库状态检查完成', 'success');
            } catch (error) {
                log('❌ 检查失败: ' + error.message, 'error');
            }
        };

        // 2. API 凭证测试
        window.testSaveApiKey = async () => {
            const apiKey = document.getElementById('testApiKey').value;
            try {
                await storage.setApiKey(apiKey);
                log('✅ API Key 保存成功', 'success');
            } catch (error) {
                log('❌ 保存失败: ' + error.message, 'error');
            }
        };

        window.testLoadApiKey = async () => {
            try {
                const apiKey = await storage.getApiKey();
                document.getElementById('credentialsResult').innerHTML = 
                    `<pre>API Key: ${apiKey || '(空)'}</pre>`;
                log('✅ API Key 读取成功', 'success');
            } catch (error) {
                log('❌ 读取失败: ' + error.message, 'error');
            }
        };

        window.testSaveAccessKeys = async () => {
            const accessKeyId = document.getElementById('testAccessKeyId').value;
            const secretKey = document.getElementById('testSecretKey').value;
            try {
                await storage.setAccessKeys(accessKeyId, secretKey);
                log('✅ Access Keys 保存成功', 'success');
            } catch (error) {
                log('❌ 保存失败: ' + error.message, 'error');
            }
        };

        window.testLoadAccessKeys = async () => {
            try {
                const keys = await storage.getAccessKeys();
                document.getElementById('credentialsResult').innerHTML = 
                    `<pre>Access Key ID: ${keys.accessKeyId || '(空)'}
Secret Key: ${keys.secretAccessKey || '(空)'}</pre>`;
                log('✅ Access Keys 读取成功', 'success');
            } catch (error) {
                log('❌ 读取失败: ' + error.message, 'error');
            }
        };

        // 3. 配置测试
        window.testSaveConfig = async () => {
            const config = {
                bucket: 'test-bucket',
                region: 'cn-beijing',
                endpoint: 'https://test.endpoint.com'
            };
            try {
                await storage.setTOSConfig(config);
                log('✅ TOS 配置保存成功', 'success');
            } catch (error) {
                log('❌ 保存失败: ' + error.message, 'error');
            }
        };

        window.testLoadConfig = async () => {
            try {
                const config = await storage.getTOSConfig();
                document.getElementById('configResult').innerHTML = 
                    `<pre>${JSON.stringify(config, null, 2)}</pre>`;
                log('✅ TOS 配置读取成功', 'success');
            } catch (error) {
                log('❌ 读取失败: ' + error.message, 'error');
            }
        };

        // 4. 历史记录测试
        window.testSaveHistory = async () => {
            const historyItem = {
                id: 'test-' + Date.now(),
                prompt: '测试提示词',
                imageUrl: 'https://example.com/image.jpg',
                timestamp: new Date().toISOString()
            };
            try {
                await storage.saveGenerationHistory(historyItem);
                log('✅ 历史记录保存成功', 'success');
            } catch (error) {
                log('❌ 保存失败: ' + error.message, 'error');
            }
        };

        window.testLoadHistory = async () => {
            try {
                const history = await storage.getGenerationHistory();
                document.getElementById('historyResult').innerHTML = 
                    `<pre>历史记录数: ${history.length}\n${JSON.stringify(history.slice(0, 3), null, 2)}</pre>`;
                log('✅ 历史记录读取成功', 'success');
            } catch (error) {
                log('❌ 读取失败: ' + error.message, 'error');
            }
        };

        window.testClearHistory = async () => {
            try {
                await storage.clearGenerationHistory();
                log('✅ 历史记录清空成功', 'success');
                testLoadHistory();
            } catch (error) {
                log('❌ 清空失败: ' + error.message, 'error');
            }
        };

        // 5. 任务管理测试
        let testTaskId = 'task-' + Date.now();
        
        window.testSaveTask = async () => {
            const task = {
                id: testTaskId,
                prompt: '测试视频任务',
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            try {
                await storage.saveJimeng30ProTask(task);
                log('✅ 任务创建成功: ' + testTaskId, 'success');
            } catch (error) {
                log('❌ 创建失败: ' + error.message, 'error');
            }
        };

        window.testLoadTasks = async () => {
            try {
                const tasks = await storage.getJimeng30ProTasks();
                document.getElementById('taskResult').innerHTML = 
                    `<pre>任务数: ${tasks.length}\n${JSON.stringify(tasks.slice(0, 3), null, 2)}</pre>`;
                log('✅ 任务列表读取成功', 'success');
            } catch (error) {
                log('❌ 读取失败: ' + error.message, 'error');
            }
        };

        window.testUpdateTask = async () => {
            try {
                await storage.updateJimeng30ProTask(testTaskId, { 
                    status: 'completed',
                    result: '任务完成'
                });
                log('✅ 任务更新成功', 'success');
                testLoadTasks();
            } catch (error) {
                log('❌ 更新失败: ' + error.message, 'error');
            }
        };

        window.testDeleteTask = async () => {
            try {
                await storage.deleteJimeng30ProTask(testTaskId);
                log('✅ 任务删除成功', 'success');
                testLoadTasks();
            } catch (error) {
                log('❌ 删除失败: ' + error.message, 'error');
            }
        };

        // 6. 数据迁移测试
        window.testMigration = async () => {
            try {
                // 模拟 localStorage 数据
                localStorage.setItem('seedream_api_key', 'migrated-api-key');
                localStorage.setItem('volcengine_access_key_id', 'migrated-access-key');
                localStorage.setItem('tos_config', JSON.stringify({
                    bucket: 'migrated-bucket',
                    region: 'cn-beijing'
                }));
                
                log('✅ 模拟 localStorage 数据已创建', 'success');
                log('ℹ️ 请刷新页面以触发自动迁移', 'info');
            } catch (error) {
                log('❌ 模拟失败: ' + error.message, 'error');
            }
        };

        window.checkMigrationStatus = async () => {
            try {
                const status = await storage.getItem('migration_completed');
                document.getElementById('migrationResult').innerHTML = 
                    `<pre>迁移状态: ${status ? '已完成' : '未完成'}
时间戳: ${status?.timestamp || 'N/A'}</pre>`;
                log('✅ 迁移状态检查完成', 'success');
            } catch (error) {
                log('❌ 检查失败: ' + error.message, 'error');
            }
        };

        // 7. 批量操作测试
        window.testBulkOperations = async () => {
            const items = [];
            for (let i = 0; i < 10; i++) {
                items.push({
                    id: `bulk-${Date.now()}-${i}`,
                    type: 'image_generation',
                    data: { test: `bulk data ${i}` },
                    status: 'completed',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });
            }
            
            try {
                const start = performance.now();
                await dbManager.bulkAdd('history', items);
                const end = performance.now();
                log(`✅ 批量添加 10 条记录成功，耗时: ${(end - start).toFixed(2)}ms`, 'success');
            } catch (error) {
                log('❌ 批量添加失败: ' + error.message, 'error');
            }
        };

        window.testGetAllData = async () => {
            try {
                const data = await storage.exportData();
                document.getElementById('bulkResult').innerHTML = 
                    `<pre>导出数据:\n${JSON.stringify({
                        credentials: data.credentials.length,
                        configs: data.configs.length,
                        history: data.history.length,
                        tasks: data.tasks.length
                    }, null, 2)}</pre>`;
                log('✅ 数据导出成功', 'success');
            } catch (error) {
                log('❌ 导出失败: ' + error.message, 'error');
            }
        };

        window.testClearAll = async () => {
            if (!confirm('确定要清空所有数据吗？')) return;
            
            try {
                await storage.clearAll();
                log('✅ 所有数据已清空', 'success');
                checkDatabaseStatus();
            } catch (error) {
                log('❌ 清空失败: ' + error.message, 'error');
            }
        };

        // 8. 性能测试
        window.testPerformance = async () => {
            const results = [];
            
            // 测试1: 写入性能
            const writeStart = performance.now();
            for (let i = 0; i < 100; i++) {
                await storage.setItem(`perf-test-${i}`, { data: 'test' });
            }
            const writeEnd = performance.now();
            results.push(`写入 100 条: ${(writeEnd - writeStart).toFixed(2)}ms`);
            
            // 测试2: 读取性能
            const readStart = performance.now();
            for (let i = 0; i < 100; i++) {
                await storage.getItem(`perf-test-${i}`);
            }
            const readEnd = performance.now();
            results.push(`读取 100 条: ${(readEnd - readStart).toFixed(2)}ms`);
            
            // 测试3: storageSync (缓存) 性能
            const syncStart = performance.now();
            for (let i = 0; i < 100; i++) {
                storageSync.getApiKey();
            }
            const syncEnd = performance.now();
            results.push(`缓存读取 100 次: ${(syncEnd - syncStart).toFixed(2)}ms`);
            
            document.getElementById('performanceResult').innerHTML = 
                `<pre>${results.join('\n')}</pre>`;
            log('✅ 性能测试完成', 'success');
            
            // 清理测试数据
            for (let i = 0; i < 100; i++) {
                await storage.removeItem(`perf-test-${i}`);
            }
        };

        // 自动初始化
        log('页面加载完成，准备测试', 'info');
        testDatabaseInit();
    </script>
</body>
</html>
